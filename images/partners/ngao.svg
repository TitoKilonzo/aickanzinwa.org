<svg viewBox="0 0 200 90" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="90" rx="8" fill="#fff"/>
  <!-- Kenya shield emblem simplified -->
  <path d="M30 12 L58 12 L58 56 Q44 72 30 56 Z" fill="#006600" opacity="0.12"/>
  <path d="M30 12 L58 12 L58 56 Q44 72 30 56 Z" stroke="#006600" stroke-width="2.5" fill="none"/>
  <!-- Kenya flag stripes clipped to shield -->
  <clipPath id="ngaoShield"><path d="M30 12 L58 12 L58 56 Q44 72 30 56 Z"/></clipPath>
  <rect x="30" y="12" width="28" height="12" fill="#006600" clip-path="url(#ngaoShield)"/>
  <rect x="30" y="24" width="28" height="6"  fill="#CC0000" clip-path="url(#ngaoShield)"/>
  <rect x="30" y="30" width="28" height="12" fill="#1a1a1a" clip-path="url(#ngaoShield)"/>
  <rect x="30" y="42" width="28" height="6"  fill="#CC0000" clip-path="url(#ngaoShield)"/>
  <rect x="30" y="48" width="28" height="24" fill="#006600" clip-path="url(#ngaoShield)"/>
  <!-- Two Maasai spears -->
  <line x1="37" y1="8" x2="37" y2="76" stroke="#8B6914" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="51" y1="8" x2="51" y2="76" stroke="#8B6914" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Spear tips -->
  <polygon points="37,8 34,18 40,18" fill="#8B6914"/>
  <polygon points="51,8 48,18 54,18" fill="#8B6914"/>
  <!-- Text block -->
  <text x="70" y="28" font-family="Arial,sans-serif" font-weight="700" font-size="10" fill="#333">National Government</text>
  <text x="70" y="42" font-family="Arial,sans-serif" font-weight="700" font-size="10" fill="#333">Administration Office</text>
  <text x="70" y="57" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#006600">(NGAO)</text>
  <text x="70" y="70" font-family="Arial,sans-serif" font-size="8" fill="#888">Ministry of Interior, Kenya</text>
</svg>
