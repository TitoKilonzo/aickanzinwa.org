<svg viewBox="0 0 180 80" xmlns="http://www.w3.org/2000/svg">
  <rect width="180" height="80" rx="8" fill="#fff"/>
  <!-- Shield outline -->
  <path d="M40 10 L60 10 L60 48 Q50 62 40 48 Z" fill="#006600" opacity="0.1"/>
  <path d="M40 10 L60 10 L60 48 Q50 62 40 48 Z" stroke="#006600" stroke-width="2.5" fill="none"/>
  <!-- Kenya flag bands inside shield -->
  <clipPath id="shieldClip"><path d="M40 10 L60 10 L60 48 Q50 62 40 48 Z"/></clipPath>
  <rect x="40" y="10" width="20" height="10" fill="#006600" clip-path="url(#shieldClip)"/>
  <rect x="40" y="20" width="20" height="5" fill="#BB0000" clip-path="url(#shieldClip)"/>
  <rect x="40" y="25" width="20" height="10" fill="#1a1a1a" clip-path="url(#shieldClip)"/>
  <rect x="40" y="35" width="20" height="5" fill="#BB0000" clip-path="url(#shieldClip)"/>
  <rect x="40" y="40" width="20" height="22" fill="#006600" clip-path="url(#shieldClip)"/>
  <!-- Spears -->
  <line x1="46" y1="8" x2="46" y2="65" stroke="#8B6914" stroke-width="2"/>
  <line x1="54" y1="8" x2="54" y2="65" stroke="#8B6914" stroke-width="2"/>
  <!-- Text -->
  <text x="72" y="28" font-family="Arial,sans-serif" font-weight="700" font-size="11" fill="#333">National Govt.</text>
  <text x="72" y="44" font-family="Arial,sans-serif" font-weight="700" font-size="11" fill="#333">Admin. Office</text>
  <text x="72" y="59" font-family="Arial,sans-serif" font-size="10" fill="#006600">(NGAO)</text>
</svg>
