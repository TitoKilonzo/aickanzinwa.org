<svg viewBox="0 0 200 90" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="90" rx="8" fill="#fff"/>
  <!-- S mark — bold angular S in orange/green -->
  <rect x="10" y="10" width="48" height="70" rx="6" fill="#E85D04"/>
  <!-- S letter cut-outs to form S shape -->
  <rect x="16" y="16" width="30" height="14" rx="3" fill="#fff"/>
  <rect x="16" y="38" width="30" height="14" rx="3" fill="#fff"/>
  <rect x="16" y="60" width="30" height="14" rx="3" fill="#fff"/>
  <!-- Horizontal bars for S -->
  <rect x="16" y="16" width="36" height="14" rx="3" fill="#fff"/>
  <rect x="22" y="38" width="30" height="14" rx="3" fill="#fff"/>
  <rect x="16" y="60" width="36" height="14" rx="3" fill="#fff"/>
  <!-- The S in orange -->
  <text x="30" y="64" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="52" fill="#fff" text-anchor="middle">S</text>
  <!-- Text -->
  <text x="74" y="32" font-family="Arial,sans-serif" font-weight="700" font-size="13" fill="#E85D04">SENSEI</text>
  <text x="74" y="48" font-family="Arial,sans-serif" font-weight="700" font-size="10" fill="#1B4332">Institute of</text>
  <text x="74" y="62" font-family="Arial,sans-serif" font-weight="700" font-size="10" fill="#1B4332">Technology</text>
  <text x="74" y="76" font-family="Arial,sans-serif" font-size="8" fill="#888">Nairobi &amp; Nakuru, Kenya</text>
</svg>
